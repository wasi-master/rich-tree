site_name: rich-tree
site_url: https://wasi-master.github.io/rich-tree
site_description: A better tree command with beautiful icons and colors made in Python

repo_name: wasi-master/rich-tree
repo_url: https://github.com/wasi-master/rich-tree

theme:
  name: material
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - tables

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Features: features.md
  - CLI Reference: cli-reference.md
  - Icon System: icons.md
  - Onboarding Wizard: onboarding.md
  - Configuration: configuration.md
  - Contributing: contributing.md
  - Changelog: changelog.md
